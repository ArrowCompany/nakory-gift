<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu tarjeta VIP - Nakory Gift</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .wrap { width: 380px; max-width: 100%; }
  .card {
    border-radius: 24px;
    padding: 24px 20px 18px;
    background: linear-gradient(135deg, #f6c9d8 0%, #d9d3ee 35%, #f9dfc2 65%, #fff6c9 85%, #bfe9de 100%);
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  }
  .logo-wrap {
    width: 64px; height: 64px; border-radius: 50%; background: #fff; border: 3px solid #222;
    display: flex; align-items: center; justify-content: center; margin-bottom: 10px; overflow: hidden;
  }
  .logo-wrap img { width: 78%; height: 78%; object-fit: contain; }
  h1 { font-size: 17px; line-height: 1.35; margin: 4px 0 16px; color: #2c2c2c; font-weight: 700; }
  h2 { font-size: 16px; margin: 0 0 2px; color: #2c2c2c; font-weight: 600; }
  .promo { font-size: 18px; font-weight: bold; color: #2c2c2c; margin: 4px 0 16px; }
  .stamps { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
  .stamp {
    width: 44px; height: 44px; border-radius: 50%; background: #f4a6c1;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.6);
  }
  .stamp.filled { background: #fff; }
  .stamp img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
  .footer { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill {
    background: rgba(155, 120, 200, 0.55); color: #fff; font-size: 13px; font-weight: 600;
    padding: 6px 14px; border-radius: 20px;
  }
  .reward-banner {
    margin-top: 16px; background: rgba(255,255,255,0.85); border: 2px dashed #d4537e;
    border-radius: 14px; padding: 12px 14px; text-align: center; display: none;
  }
  .reward-banner.show { display: block; }
  .reward-banner p { margin: 0; font-size: 14px; color: #99355a; font-weight: bold; }

  .historial {
    background: #fff; border-radius: 16px; margin-top: 14px; padding: 16px 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }
  .historial h3 { font-size: 14px; margin: 0 0 12px; color: #2c2c2c; }
  .compra {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid #f0eef4; font-size: 13px;
  }
  .compra:last-child { border-bottom: none; }
  .compra .num {
    width: 24px; height: 24px; border-radius: 50%; background: #f4a6c1; color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    margin-right: 10px; flex-shrink: 0;
  }
  .compra .info { flex: 1; }
  .compra .detalle { font-weight: 600; color: #2c2c2c; }
  .compra .fecha { font-size: 11px; color: #918a9e; margin-top: 2px; }
  .compra .valor { font-weight: 700; color: #6e56a8; white-space: nowrap; }
  .row-left { display: flex; align-items: flex-start; }
  .estado { text-align: center; font-size: 13px; color: #877f95; padding: 30px 0; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="estado" id="cargando">Cargando tu tarjeta...</div>
</div>

const META = 10;

const params = new URLSearchParams(window.location.search);
const clienteId = params.get('id');

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxdSZdzIlFUDrEsNI7v1jc84xQgvm0CWDmw_eboZ1MKjKNbszz65OooiKO1pu_M5ceGQ/exec';

async function cargarTarjeta() {
  const app = document.getElementById('app');
  if (!clienteId) {
    app.innerHTML = '<div class="estado">Falta el identificador de la clienta en el link.</div>';
    return;
  }
  try {
    const resp = await fetch(SCRIPT_URL + '?action=tarjeta&id=' + encodeURIComponent(clienteId));
    const data = await resp.json();
    if (!data.success) {
      app.innerHTML = '<div class="estado">No se encontró tu tarjeta. Contacta a @nakory_gift.</div>';
      return;
    }
    renderTarjeta(data);
  } catch (err) {
    app.innerHTML = '<div class="estado">No se pudo cargar tu tarjeta. Intenta de nuevo.</div>';
  }
}

function renderTarjeta(data) {
  const totalSellos = Number(data.totalSellos) || 0;
  let stampsHtml = '';
  for (let i = 0; i < META; i++) {
    if (i < totalSellos) {
      stampsHtml += '<div class="stamp filled"><img src="' + FACE + '"></div>';
    } else {
      stampsHtml += '<div class="stamp"></div>';
    }
  }

  let historialHtml = '';
  if (data.historial && data.historial.length) {
    data.historial.slice().reverse().forEach((c, idx) => {
      historialHtml += '<div class="compra"><div class="row-left"><div class="num">' + (data.historial.length - idx) + '</div><div class="info"><div class="detalle">' + c.detalle + '</div><div class="fecha">' + c.fecha + '</div></div></div><div class="valor">$' + c.valor + '</div></div>';
    });
  } else {
    historialHtml = '<div class="compra">Aún no hay compras registradas.</div>';
  }
